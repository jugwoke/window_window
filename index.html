<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>window</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Arial Black', 'Franklin Gothic Medium', Arial, sans-serif;
    }

    #window-box {
      position: relative;
      width: 240px;
      height: 90px;
      background: #00aeef;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #window-box span {
      color: #ffe600;
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    #close-btn {
      position: absolute;
      top: 0;
      right: 0;
      width: 36px;
      height: 36px;
      background: #d62b2b;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div id="window-box">
    <span>window</span>
    <button id="close-btn">X</button>
  </div>

  <script>
    document.getElementById('close-btn').addEventListener('click', function() {
      document.getElementById('window-box').style.display = 'none';
    });
  </script>

</body>
</html>
